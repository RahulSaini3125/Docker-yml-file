version: "3.8"

services:
  nginx-proxy-manager:
    image: jc21/nginx-proxy-manager:latest
    container_name: nginx-proxy-manager
    restart: unless-stopped
    ports:
      - "80:80" # HTTP
      - "443:443" # HTTPS
      - "81:81" # Admin Web UI
    environment:
      # Database configuration
      DB_SQLITE_FILE: "/data/database.sqlite"
      # Admin credentials from .env file
      INITIAL_ADMIN_EMAIL: ${NPM_ADMIN_EMAIL}
      INITIAL_ADMIN_PASSWORD: ${NPM_ADMIN_PASSWORD}
      # Disable telemetry (optional)
      DISABLE_IPV6: "true"
    volumes:
      - npm_data:/data
      - npm_letsencrypt:/etc/letsencrypt
    networks:
      - nginx-proxy-manager
    healthcheck:
      test: [ "CMD", "/bin/check-health" ]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  npm_data:
    driver: local
  npm_letsencrypt:
    driver: local

networks:
  nginx-proxy-manager:
    driver: bridge
